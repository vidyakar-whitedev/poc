apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  labels:
    app: flask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask
        image: my-flask-app:latest   # your Docker image
        imagePullPolicy: IfNotPresent  # <-- critical: use local image, don't pull
        ports:
        - containerPort: 5000
        readinessProbe:               # ensures pod is ready only after Flask starts
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 2