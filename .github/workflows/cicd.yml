name: CI/CD with kind

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: my-app
  TAG: ${{ github.sha }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: engineerd/setup-kind@v0.6.0
        with:
          version: v0.20.0

      - uses: docker/setup-buildx-action@v3

      - run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.TAG }} .

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.TAG }}'
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - uses: engineerd/setup-kind@v0.9.0
        with:
          version: v0.20.0

      - run: kind load docker-image ${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - run: |
          sed -i "s|image: my-app:latest|image: my-app:${{ env.TAG }}|" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/my-app
