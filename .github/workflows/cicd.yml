name: CI-CD Build Scan Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: my-app
  IMAGE_TAG: latest
  APP_PORT: 5000  # Flask app port

jobs:
  build-scan-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Install Trivy vulnerability scanner
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget https://aquasecurity.github.io/trivy-repo/deb/public.key
          sudo apt-key add public.key
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # Run container
      - name: Run Container
        run: |
          docker run -d -p $APP_PORT:$APP_PORT -e PORT=$APP_PORT --name test-container $IMAGE_NAME:$IMAGE_TAG
          sleep 10

      # Test Application endpoint
      - name: Test Application
        run: |
          RESPONSE=$(curl -s -f http://localhost:$APP_PORT) || exit 1
          echo "✅ App is serving properly!"
          echo "💡 Output from app: $RESPONSE"
          echo "🔗 You can access the app locally on port $APP_PORT"

      # Scan Docker Image
      - name: Scan Docker Image
        run: |
          trivy image \
            --exit-code 1 \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG

      # Cleanup container
      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true
