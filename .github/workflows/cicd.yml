name: CI-CD Flask App on KIND

# ─────────────────────────────────────────────
#  Triggers
# ─────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      expose_browser:
        description: 'Open app in browser via bore tunnel (true/false)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# ─────────────────────────────────────────────
#  Shared environment variables
# ─────────────────────────────────────────────
env:
  IMAGE_NAME: my-flask-app
  IMAGE_TAG:  latest
  APP_PORT:   5000      # Flask container port
  NODE_PORT:  30000     # NodePort in service.yaml
  CLUSTER:    flask-cluster
  SCANNER_REPORT: scanner.txt

# ─────────────────────────────────────────────
#  Job: build → scan → deploy → test
#  Runner: ubuntu-latest (free GitHub-hosted)
# ─────────────────────────────────────────────
jobs:
  build-deploy-test:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Source code ───────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Docker build ──────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # ── 3. Security scans ────────────────────
      - name: Scan image with Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          echo "=== Trivy Scan ===" | tee $SCANNER_REPORT
          trivy image --exit-code 0 $IMAGE_NAME:$IMAGE_TAG | tee -a $SCANNER_REPORT

      - name: Scan image with Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          echo "=== Grype Scan ===" | tee -a $SCANNER_REPORT
          grype $IMAGE_NAME:$IMAGE_TAG | tee -a $SCANNER_REPORT

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: ${{ env.SCANNER_REPORT }}

      # ── 4. Kubernetes tooling ────────────────
      - name: Install kind
        run: |
          curl -Lo /usr/local/bin/kind \
            https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x /usr/local/bin/kind

      - name: Install kubectl
        run: |
          KUBECTL_VER=$(curl -sL https://dl.k8s.io/release/stable.txt)
          curl -Lo /usr/local/bin/kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl

      # ── 5. KIND cluster ──────────────────────
      # kind-config.yaml includes extraPortMappings so NodePort 30000
      # is bound to the runner's localhost (useful for local dev too).
      - name: Create KIND cluster
        run: kind create cluster --name $CLUSTER --config kind-config.yaml

      # ── 6. Load image ────────────────────────
      # No registry needed — image is loaded directly into the cluster.
      - name: Load Docker image into KIND
        run: kind load docker-image $IMAGE_NAME:$IMAGE_TAG --name $CLUSTER

      # ── 7. Deploy ────────────────────────────
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # ── 8. Wait for pod ──────────────────────
      # Wait for the pod to be *created* first (kubectl wait needs
      # at least one matching resource to exist before it can poll).
      - name: Wait for pod to be created
        run: |
          echo "Waiting for pod to appear..."
          for i in $(seq 1 30); do
            COUNT=$(kubectl get pods -l app=flask --no-headers 2>/dev/null | wc -l | tr -d ' ')
            if [ "$COUNT" -gt 0 ]; then
              echo "✅ Pod found. Proceeding to readiness check."
              break
            fi
            echo "  No pods yet ($i/30) — waiting 2s..."
            sleep 2
          done

      - name: Wait for pod to be ready
        run: kubectl wait --for=condition=ready pod -l app=flask --timeout=120s

      # ── 9. Smoke test ────────────────────────
      # In GH Actions the runner is a private VM with no public IP.
      # NodePort is not reachable from outside; kubectl port-forward
      # tunnels through the kube-apiserver and always works reliably.
      - name: Test Flask app
        run: |
          POD=$(kubectl get pods -l app=flask -o jsonpath='{.items[0].metadata.name}')
          echo "Port-forwarding $POD → localhost:$APP_PORT"
          kubectl port-forward pod/$POD $APP_PORT:$APP_PORT &
          PF_PID=$!

          echo "Waiting for Flask to respond..."
          READY=0
          for i in $(seq 1 15); do
            if curl -fs "http://localhost:$APP_PORT" > /dev/null 2>&1; then
              READY=1; break
            fi
            echo "  Attempt $i/15 — sleeping 2s..."
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "❌ Flask did not respond after 30s."
            kubectl logs -l app=flask
            kill $PF_PID 2>/dev/null || true
            exit 1
          fi

          RESPONSE=$(curl -s "http://localhost:$APP_PORT")
          echo ""
          echo "────────────────────────────────────"
          echo " Flask response: $RESPONSE"
          echo " ✅ App is working correctly!"
          echo "────────────────────────────────────"
          kill $PF_PID 2>/dev/null || true

      # ── 10. Browser access (optional) ────────
      # Only runs when manually triggered with expose_browser = true.
      #
      # How to use:
      #   Actions → CI-CD Flask App on KIND → Run workflow
      #   → set expose_browser = true → Run workflow
      #
      # Watch the logs for:
      #   🌍 Public URL: http://bore.pub:XXXXX
      # Open that URL in your browser to see the live Flask app.
      # The tunnel stays open for 90 s then the pipeline finishes.
      - name: Expose app via bore tunnel (browser access)
        if: ${{ github.event.inputs.expose_browser == 'true' }}
        run: |
          echo "Downloading bore..."
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /usr/local/bin
          chmod +x /usr/local/bin/bore

          # Re-open port-forward (previous one was killed after test)
          POD=$(kubectl get pods -l app=flask -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward pod/$POD $APP_PORT:$APP_PORT &
          sleep 3

          # Open bore tunnel
          bore local $APP_PORT --to bore.pub > /tmp/bore.log 2>&1 &
          BORE_PID=$!
          sleep 5

          BORE_PORT=$(grep -oP 'bore\.pub:\K[0-9]+' /tmp/bore.log | head -1)

          echo ""
          echo "============================================================"
          echo " 🌍 Public URL: http://bore.pub:$BORE_PORT"
          echo " Open this in your browser to see the Flask app live!"
          echo " Pipeline pauses for 90 seconds then continues..."
          echo "============================================================"
          echo ""

          sleep 90
          kill $BORE_PID 2>/dev/null || true
          echo "Bore tunnel closed."

      # ── 11. Cleanup ──────────────────────────
      - name: Cleanup KIND cluster
        if: always()
        run: kind delete cluster --name $CLUSTER
