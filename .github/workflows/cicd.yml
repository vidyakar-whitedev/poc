name: CI/CD with kind

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: my-app
  TAG: ${{ github.sha }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build Docker image
      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.TAG }} .

      # Scan with Trivy
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.TAG }}'
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Setup kind
      - name: Setup kind
        uses: engineerd/setup-kind@v0.9.0
        with:
          version: v0.20.0

      # Verify cluster
      - name: Check cluster
        run: kubectl get nodes

      # Load image into kind
      - name: Load image to kind
        run: kind load docker-image ${{ env.IMAGE_NAME }}:${{ env.TAG }} --name kind

      # Deploy to Kubernetes
      - name: Deploy
        run: |
          sed -i "s|image: my-app:latest|image: my-app:${{ env.TAG }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/my-app
          kubectl get pods
          kubectl get svc
