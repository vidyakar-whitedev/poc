name: CI-CD Flask App on kind

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: my-flask-app
  IMAGE_TAG: latest
  APP_PORT: 5000
  NODE_PORT: 30000
  # DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  # DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-deploy-test:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------
      # DockerHub login (commented)
      # -------------------------------
      # - name: Docker Login
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # -------------------------------
      # Push Docker image (commented)
      # -------------------------------
      # - name: Push Docker Image
      #   run: |
      #     docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
      #     docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG

      # Install kind and kubectl
      - name: Install kind and kubectl
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # Create kind cluster
      - name: Create kind cluster
        run: kind create cluster --name flask-cluster

      # Load Docker image into kind
      - name: Load Docker image into kind
        run: kind load docker-image $IMAGE_NAME:$IMAGE_TAG --name flask-cluster

      # Apply Kubernetes manifests
      - name: Deploy to kind
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # Wait for pod to be ready
      - name: Wait for pod
        run: |
          kubectl wait --for=condition=ready pod -l app=flask --timeout=60s

      # Test Flask app via NodePort
      - name: Test Flask App
        run: |
          curl -f http://localhost:$NODE_PORT || exit 1
          echo "✅ Flask app is serving properly! Access via localhost:$NODE_PORT"

      # Cleanup kind cluster
      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name flask-cluster
