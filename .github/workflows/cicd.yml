name: CI-CD Build Scan Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: my-app
  IMAGE_TAG: latest

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Install Trivy vulnerability scanner
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget https://aquasecurity.github.io/trivy-repo/deb/public.key
          sudo apt-key add public.key
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # ❌ COMMENTED: DockerHub login (not needed if not pushing)
      # - name: Docker Login
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # Run container to test if app starts
      - name: Run Container
        run: |
          docker run -d -p 8080:8080 --name test-container $IMAGE_NAME:$IMAGE_TAG
          sleep 10

      # Check if application is serving
      - name: Test Application
        run: |
          curl -f http://localhost:8080 || exit 1

      # Scan Image - Fail if ANY vulnerability found
      - name: Scan Docker Image
        run: |
          trivy image \
            --exit-code 1 \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG

      # ❌ COMMENTED: Tag image for DockerHub
      # - name: Tag Image
      #   run: |
      #     docker tag $IMAGE_NAME:$IMAGE_TAG ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$IMAGE_TAG

      # ❌ COMMENTED: Push image to DockerHub
      # - name: Push Docker Image
      #   if: success()
      #   run: |
      #     docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$IMAGE_TAG
