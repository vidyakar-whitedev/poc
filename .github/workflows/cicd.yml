name: CI-CD Flask App on kind

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Manually trigger with browser access window
  workflow_dispatch:
    inputs:
      expose_browser:
        description: 'Expose app publicly so you can open it in a browser (bore tunnel)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  IMAGE_NAME: my-flask-app
  IMAGE_TAG: latest
  APP_PORT: 5000          # Flask container port (used for port-forward in CI)
  NODE_PORT: 30000        # NodePort in service.yaml (used in local script only)
  SCANNER_REPORT: scanner.txt
  # DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  # DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-deploy-test:
    runs-on: ubuntu-latest
    steps:

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------
      # DockerHub login (commented)
      # -------------------------------
      # - name: Docker Login
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # -------------------------------
      # Push Docker image (commented)
      # -------------------------------
      # - name: Push Docker Image
      #   run: |
      #     docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
      #     docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG

      # ===================== Scan Docker image =====================

      # Scan with Trivy
      - name: Scan Docker image with Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          echo "=== Scanning Docker image with Trivy ===" | tee $SCANNER_REPORT
          trivy image $IMAGE_NAME:$IMAGE_TAG | tee -a $SCANNER_REPORT

      # Scan with Grype
      - name: Scan Docker image with Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          echo "=== Scanning Docker image with Grype ===" | tee -a $SCANNER_REPORT
          grype $IMAGE_NAME:$IMAGE_TAG | tee -a $SCANNER_REPORT
          echo "=== Scan complete! Reports saved in $SCANNER_REPORT ==="

      # Upload scan report as artifact
      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report
          path: ${{ env.SCANNER_REPORT }}

      # =============================================================

      # Install kind and kubectl
      - name: Install kind and kubectl
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # Create kind cluster (kind-config.yaml has extraPortMappings for local use)
      - name: Create kind cluster
        run: kind create cluster --name flask-cluster --config kind-config.yaml

      # Load Docker image into kind
      - name: Load Docker image into kind
        run: kind load docker-image $IMAGE_NAME:$IMAGE_TAG --name flask-cluster

      # Apply Kubernetes manifests
      - name: Deploy to kind
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # Wait for pod to be created before checking readiness
      - name: Wait for pod to be created
        run: |
          for i in $(seq 1 30); do
            POD_COUNT=$(kubectl get pods -l app=flask --no-headers 2>/dev/null | wc -l | tr -d ' ')
            if [ "$POD_COUNT" -gt 0 ]; then
              echo "Pod(s) found ($POD_COUNT). Waiting for readiness..."
              break
            fi
            echo "No pods yet... ($i/30)"
            sleep 2
          done

      # Wait for pod to be ready
      - name: Wait for pod to be ready
        run: |
          kubectl wait --for=condition=ready pod -l app=flask --timeout=120s

      # Test Flask app via port-forward
      # NOTE: In GitHub Actions, the runner is a private remote VM — there is NO way to
      # open a browser to localhost:30000 from outside. NodePort extraPortMappings only
      # works reliably on your local Mac. In CI we use kubectl port-forward, which tunnels
      # through the kube-apiserver and works reliably regardless of Docker network config.
      - name: Test Flask App
        run: |
          POD_NAME=$(kubectl get pods -l app=flask -o jsonpath='{.items[0].metadata.name}')
          echo "Port-forwarding pod: $POD_NAME"
          kubectl port-forward pod/$POD_NAME $APP_PORT:$APP_PORT &
          PF_PID=$!

          FLASK_READY=0
          for i in $(seq 1 15); do
            if curl -fs "http://localhost:$APP_PORT" > /dev/null 2>&1; then
              echo "✅ Flask app is ready!"
              FLASK_READY=1
              break
            else
              echo "Waiting for Flask... ($i/15)"
              sleep 2
            fi
          done

          if [ "$FLASK_READY" -ne 1 ]; then
            echo "❌ Flask never became ready."
            kubectl logs -l app=flask
            kill $PF_PID 2>/dev/null || true
            exit 1
          fi

          RESPONSE=$(curl -s "http://localhost:$APP_PORT")
          echo "Flask response: $RESPONSE"
          echo ""
          echo "✅ Flask app is serving properly!"
          kill $PF_PID 2>/dev/null || true

      # ---------------------------------------------------------------
      # BROWSER ACCESS STEP (only runs when triggered manually with
      # expose_browser = true via Actions → Run workflow)
      #
      # How it works:
      #   bore is a free, open-source reverse-proxy that creates a
      #   public TCP tunnel from bore.pub:<random-port> → localhost:5000
      #   on the GH Actions runner. No account or token needed.
      #
      # How to use:
      #   1. Go to Actions tab → "CI-CD Flask App on kind" → Run workflow
      #   2. Set expose_browser = true
      #   3. Trigger the run and watch the logs for:
      #        🌍 Public URL: http://bore.pub:XXXXX
      #   4. Open that URL in your browser — you'll see the Flask app!
      #   5. The pipeline waits 90 seconds then continues automatically
      # ---------------------------------------------------------------
      - name: "[OPTIONAL] Expose app in browser via bore tunnel"
        if: ${{ github.event.inputs.expose_browser == 'true' }}
        run: |
          echo "Installing bore tunnel..."
          curl -L https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          chmod +x bore

          # Start kubectl port-forward to localhost:5000
          POD_NAME=$(kubectl get pods -l app=flask -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward pod/$POD_NAME $APP_PORT:$APP_PORT &
          sleep 3

          # Start bore tunnel in background, capture output
          ./bore local $APP_PORT --to bore.pub > /tmp/bore.log 2>&1 &
          BORE_PID=$!
          sleep 5

          # Extract the public port from bore output
          BORE_PORT=$(grep -oP 'bore.pub:\K[0-9]+' /tmp/bore.log | head -1)

          echo ""
          echo "===========================================================" 
          echo " 🌍 Public URL: http://bore.pub:$BORE_PORT"
          echo " Open this in your browser NOW to see the Flask app!"
          echo " Waiting 90 seconds before continuing..."
          echo "==========================================================="
          echo ""

          sleep 90
          kill $BORE_PID 2>/dev/null || true
          echo "Bore tunnel closed. Continuing pipeline..."

      # Cleanup kind cluster
      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name flask-cluster
